name: DRC Regression Testing

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'ihp-sg13g2/libs.tech/klayout/tech/drc/**'
  workflow_dispatch:

jobs:
  drc_regression:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🔢 Read KLayout version from versions.txt
        id: klayout_version
        run: |
          VERSION=$(grep '^klayout ' versions.txt | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not read klayout version from versions.txt" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_underscore=${VERSION//./_}" >> "$GITHUB_OUTPUT"
          echo "KLayout target version: $VERSION"

      - name: 💾 Restore KLayout .deb from cache
        id: cache-klayout
        uses: actions/cache@v4
        with:
          path: klayout-${{ steps.klayout_version.outputs.version_underscore }}.deb
          key: klayout-deb-cache-ubuntu-${{ steps.klayout_version.outputs.version_underscore }}
          restore-keys: |
            klayout-deb-cache-

      - name: 🔽 Download KLayout .deb if not cached
        if: steps.cache-klayout.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.klayout_version.outputs.version }}"
          VERSION_U="${{ steps.klayout_version.outputs.version_underscore }}"
          echo "Downloading KLayout .deb (${VERSION})..."
          curl -L --retry 5 --retry-delay 5 --retry-all-errors \
            -o "klayout-${VERSION_U}.deb" "https://www.klayout.org/downloads/Ubuntu-24/klayout_${VERSION}-1_amd64.deb"

      - name: ⚙️ Install KLayout
        run: |
          sudo apt update -qq -y
          sudo apt install ./klayout-${{ steps.klayout_version.outputs.version_underscore }}.deb
          echo "✅ KLayout version:"
          klayout -v

      - name: 🔎 Verify binary and pip klayout versions agree
        run: |
          make env
          EXPECTED="${{ steps.klayout_version.outputs.version }}"
          BIN_V=$(klayout -b -v | tail -1 | awk '{print $NF}')
          PIP_V=$(. actions_venv/bin/activate && python3 -c "import klayout; print(klayout.__version__)")
          echo "Expected (versions.txt):        $EXPECTED"
          echo "Binary   (klayout -b -v):       $BIN_V"
          echo "Pip pkg  (klayout.__version__): $PIP_V"
          fail=0
          if [ "$BIN_V" != "$EXPECTED" ]; then
            echo "ERROR: klayout binary ($BIN_V) != versions.txt ($EXPECTED)" >&2
            fail=1
          fi
          if [ "$PIP_V" != "$EXPECTED" ]; then
            echo "ERROR: klayout pip package ($PIP_V) != versions.txt ($EXPECTED)" >&2
            fail=1
          fi
          exit $fail

      - name: 🧪 Run KLayout DRC Regression
        run: make test-DRC-main

      - name: ⛰️ Run KLayout top-level DRC Deck
        run: |
          klayout -b -r ihp-sg13g2/libs.tech/klayout/tech/drc/ihp-sg13g2.drc \
            -rd run_mode=deep \
            -rd threads=1 \
            -rd no_feol=false \
            -rd no_beol=false \
            -rd no_offgrid=false \
            -rd no_pin=false \
            -rd no_forbidden=false \
            -rd input=ihp-sg13g2/libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true

      - name: ⛰️ Run KLayout top-level DRC Deck with selected tables
        run: |
          klayout -b -r ihp-sg13g2/libs.tech/klayout/tech/drc/ihp-sg13g2.drc \
            -rd run_mode=deep \
            -rd threads=1 \
            -rd tables="nwell activ cont vian passiv lbe metal1" \
            -rd no_feol=true \
            -rd no_beol=true \
            -rd no_offgrid=true \
            -rd no_pin=true \
            -rd no_forbidden=true \
            -rd input=ihp-sg13g2/libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true

      - name: 📜 Run KLayout "run_drc" script in sp
        run: |
          make env
          . actions_venv/bin/activate; python3 ihp-sg13g2/libs.tech/klayout/tech/drc/run_drc.py \
            --mp 1 \
            --disable_extra_rules \
            --path ihp-sg13g2/libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true

      - name: 📜 Run KLayout "run_drc" script in mp
        run: |
          make env
          . actions_venv/bin/activate; python3 ihp-sg13g2/libs.tech/klayout/tech/drc/run_drc.py \
            --mp 2 \
            --disable_extra_rules \
            --path ihp-sg13g2/libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true

      - name: 📜 Run KLayout "run_drc" script with selected tables in sp
        run: |
          make env
          . actions_venv/bin/activate; python3 ihp-sg13g2/libs.tech/klayout/tech/drc/run_drc.py \
            --mp 1 \
            --table=nwell --table=activ --table=cont --table=via1 --table=mim --no_density --disable_extra_rules \
            --path ihp-sg13g2/libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true

      - name: 📜 Run KLayout "run_drc" script with selected tables in mp
        run: |
          make env
          . actions_venv/bin/activate; python3 ihp-sg13g2/libs.tech/klayout/tech/drc/run_drc.py \
            --mp 2 \
            --table=nbulay --table=gatpoly --table=psd --table=vian --table=passiv --table=lbe --table=metal1 --no_density --disable_extra_rules \
            --path ihp-sg13g2/libs.tech/klayout/tech/drc/testing/testcases/unit/activ.gds \
          || true

  drc_regression_cells:
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🔢 Read KLayout version from versions.txt
        id: klayout_version
        run: |
          VERSION=$(grep '^klayout ' versions.txt | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not read klayout version from versions.txt" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_underscore=${VERSION//./_}" >> "$GITHUB_OUTPUT"
          echo "KLayout target version: $VERSION"

      - name: 💾 Restore KLayout .deb from cache
        id: cache-klayout
        uses: actions/cache@v4
        with:
          path: klayout-${{ steps.klayout_version.outputs.version_underscore }}.deb
          key: klayout-deb-cache-ubuntu-${{ steps.klayout_version.outputs.version_underscore }}
          restore-keys: |
            klayout-deb-cache-

      - name: 🔽 Download KLayout .deb if not cached
        if: steps.cache-klayout.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.klayout_version.outputs.version }}"
          VERSION_U="${{ steps.klayout_version.outputs.version_underscore }}"
          echo "Downloading KLayout .deb (${VERSION})..."
          curl -L --retry 5 --retry-delay 5 --retry-all-errors \
            -o "klayout-${VERSION_U}.deb" "https://www.klayout.org/downloads/Ubuntu-24/klayout_${VERSION}-1_amd64.deb"

      - name: ⚙️ Install KLayout
        run: |
          sudo apt update -qq -y
          sudo apt install ./klayout-${{ steps.klayout_version.outputs.version_underscore }}.deb
          echo "✅ KLayout version:"
          klayout -v

      - name: 🔎 Verify binary and pip klayout versions agree
        run: |
          make env
          EXPECTED="${{ steps.klayout_version.outputs.version }}"
          BIN_V=$(klayout -b -v | tail -1 | awk '{print $NF}')
          PIP_V=$(. actions_venv/bin/activate && python3 -c "import klayout; print(klayout.__version__)")
          echo "Expected (versions.txt):        $EXPECTED"
          echo "Binary   (klayout -b -v):       $BIN_V"
          echo "Pip pkg  (klayout.__version__): $PIP_V"
          fail=0
          if [ "$BIN_V" != "$EXPECTED" ]; then
            echo "ERROR: klayout binary ($BIN_V) != versions.txt ($EXPECTED)" >&2
            fail=1
          fi
          if [ "$PIP_V" != "$EXPECTED" ]; then
            echo "ERROR: klayout pip package ($PIP_V) != versions.txt ($EXPECTED)" >&2
            fail=1
          fi
          exit $fail

      - name: 🧪 Run DRC Regression for SG13G2 Cells
        run: make test-DRC-cells
